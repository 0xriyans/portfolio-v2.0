name: Deploy to DigitalOcean

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploying Application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -e
            
            # Masuk ke direktori web atau clone jika belum ada
            mkdir -p /var/www
            cd /var/www
            if [ ! -d "portfolio-v2.0" ]; then
              echo "Direktori belum ada, melakukan git clone..."
              git clone https://github.com/0xriyans/portfolio-v2.0.git
            fi
            
            cd portfolio-v2.0
            
            # Tarik kode terbaru dari GitHub
            git checkout master
            git reset --hard HEAD
            git pull origin master
            
            # Update dependencies
            echo "Updating dependencies..."
            rm -rf node_modules package-lock.json
            npm cache clean --force
            npm install --legacy-peer-deps --no-audit --no-fund
            
            # Build Gatsby site
            echo "Cleaning Gatsby cache..."
            npm run clean
            echo "Building static files..."
            npm run build
            
            # Jika menggunakan PM2 untuk serve (misal 'gatsby serve'), hapus komentar di bawah:
            # echo "Restarting PM2 services..."
            # pm2 restart portfolio
            # pm2 save
